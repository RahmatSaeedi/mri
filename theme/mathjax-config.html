<!-- MathJax config: make Persian (Arabic-script) text render correctly INSIDE
     equations in HTML. By default MathJax types \text{...} in its own math font
     (no Persian glyphs) and lays glyphs out individually, so Persian appears as
     broken, disconnected left-to-right letters. `mtextInheritFont: true` makes
     \text{...} use the surrounding page font (Vazirmatn), and the browser then
     shapes the connected Arabic letters correctly. (PDF already renders these
     correctly via LaTeX + babel.) -->
<script>
window.MathJax = {
  tex: {
    inlineMath: [["$", "$"], ["\\(", "\\)"]],
    displayMath: [["$$", "$$"], ["\\[", "\\]"]],
    processEscapes: true,
    tags: "ams",
    tagSide: "right"
  },
  chtml: { mtextInheritFont: true },
  svg: { mtextInheritFont: true }
};
</script>
