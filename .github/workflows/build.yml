name: build-and-deploy

# Renders the book (HTML + PDF) and deploys the website to GitHub Pages.
# The validated toolchain: Quarto + TinyTeX (LuaLaTeX + babel bidi=basic).
# Vazirmatn fonts are committed under fonts/ and loaded by file, so no system
# font install is needed. Diagrams are built from TikZ to PDF + SVG by
# tools/build_diagrams.py (LuaLaTeX + PyMuPDF), invoked via `make -C diagrams`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # quarto-actions installs TinyTeX to ~/.TinyTeX, but its Linux branch only
      # puts ~/bin on $GITHUB_PATH — the real binaries live in ~/.TinyTeX/bin/<arch>/.
      # `quarto render` locates them by absolute path, but bare tlmgr/lualatex/kpsewhich
      # in later run: steps (and the lualatex subprocess in build_diagrams.py) are NOT
      # on PATH and fail with "command not found". Put the real bin dir on $GITHUB_PATH
      # (GHA run: steps use bash --noprofile --norc, so PATH must go through that file).
      # Must run AFTER Quarto setup and BEFORE the LaTeX-install and figure-build steps.
      - name: Put TinyTeX's bin dir on PATH for later steps
        shell: bash
        run: |
          set -euo pipefail
          TLMGR="$(find "$HOME/.TinyTeX/bin" -maxdepth 2 -name tlmgr 2>/dev/null | head -n1 || true)"
          [ -n "$TLMGR" ] || TLMGR="$(find "$HOME/.TinyTeX" -name tlmgr 2>/dev/null | head -n1 || true)"
          if [ -z "$TLMGR" ]; then echo "::error:: tlmgr not found under ~/.TinyTeX"; exit 1; fi
          BIN_DIR="$(dirname "$TLMGR")"
          echo "TinyTeX bin dir: $BIN_DIR"
          "$BIN_DIR/tlmgr" --version >/dev/null
          echo "$BIN_DIR" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps (PyMuPDF crops figures to SVG/PDF)
        run: pip install -r requirements.txt

      # Figures compile with DIRECT lualatex (not through Quarto), so Quarto's
      # automatic missing-package install does NOT apply — every package the
      # figures load (fontspec/babel/... on EVERY figure) must be pre-installed.
      # NOTE: tlmgr names — amsfonts (not amssymb), pgf (not tikz). No `|| true`
      # on the install, so a genuine failure surfaces instead of being masked.
      - name: Install LaTeX packages
        run: |
          PKGS="fontspec babel babel-persian luaotfload unicode-math geometry pgf pgfplots xcolor amsmath amsfonts mathtools fancyvrb fvextra framed pdfpages koma-script lm"
          # Fresh TinyTeX matches the current CTAN mirror, so this normally just
          # works. The retry is insurance against a cross-release window (TinyTeX a
          # TeX Live release behind the mirror), where tlmgr refuses and we pin the
          # version-matched historic repo. (No `|| true`: a real failure must surface.)
          if ! tlmgr install $PKGS; then
            TLVER=$(tlmgr --version 2>/dev/null | sed -n 's/.*version \([0-9][0-9][0-9][0-9]\).*/\1/p' | head -1)
            echo "Default install failed; retrying via historic repo for TeX Live ${TLVER:-unknown}"
            tlmgr --repository "https://texlive.info/historic/systems/texlive/${TLVER}/tlnet-final" install $PKGS
          fi

      - name: Verify the figure toolchain (fail fast with a clear message)
        run: |
          lualatex --version | head -1
          python -c "import fitz, numpy; print('PyMuPDF + numpy OK')"
          for sty in fontspec babel tikz pgfplots geometry amsmath; do
            kpsewhich "$sty.sty" >/dev/null && echo "  ok: $sty.sty" \
              || { echo "MISSING: $sty.sty"; exit 1; }
          done

      # Pass the pip-populated interpreter explicitly: `make` would otherwise use
      # whatever `python3` resolves to, which may lack PyMuPDF/numpy.
      - name: Build vector diagrams (LuaLaTeX -> PyMuPDF -> PDF + SVG)
        run: make -C diagrams PYTHON="$(which python)"

      - name: Render book (HTML + PDF)
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
