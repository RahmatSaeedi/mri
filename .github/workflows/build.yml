name: build-and-deploy

# Renders the book (HTML + PDF) and deploys the website to GitHub Pages.
# The validated toolchain: Quarto + TinyTeX (LuaLaTeX + babel bidi=basic).
# Vazirmatn fonts are committed under fonts/ and loaded by file, so no system
# font install is needed. Diagrams are built from TikZ to PDF + SVG by
# tools/build_diagrams.py (LuaLaTeX + PyMuPDF), invoked via `make -C diagrams`.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          tinytex: true

      # quarto-actions installs TinyTeX to ~/.TinyTeX, but its Linux branch only
      # puts ~/bin on $GITHUB_PATH — the real binaries live in ~/.TinyTeX/bin/<arch>/.
      # `quarto render` locates them by absolute path, but bare tlmgr/lualatex/kpsewhich
      # in later run: steps (and the lualatex subprocess in build_diagrams.py) are NOT
      # on PATH and fail with "command not found". Put the real bin dir on $GITHUB_PATH
      # (GHA run: steps use bash --noprofile --norc, so PATH must go through that file).
      # Must run AFTER Quarto setup and BEFORE the LaTeX-install and figure-build steps.
      - name: Put TinyTeX's bin dir on PATH for later steps
        shell: bash
        run: |
          set -euo pipefail
          TLMGR="$(find "$HOME/.TinyTeX/bin" -maxdepth 2 -name tlmgr 2>/dev/null | head -n1 || true)"
          [ -n "$TLMGR" ] || TLMGR="$(find "$HOME/.TinyTeX" -name tlmgr 2>/dev/null | head -n1 || true)"
          if [ -z "$TLMGR" ]; then echo "::error:: tlmgr not found under ~/.TinyTeX"; exit 1; fi
          BIN_DIR="$(dirname "$TLMGR")"
          echo "TinyTeX bin dir: $BIN_DIR"
          "$BIN_DIR/tlmgr" --version >/dev/null
          echo "$BIN_DIR" >> "$GITHUB_PATH"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps (PyMuPDF crops figures to SVG/PDF)
        run: pip install -r requirements.txt

      # Figures compile with DIRECT lualatex (not through Quarto), so Quarto's
      # automatic missing-package install does NOT apply — every package the
      # figures load (fontspec/babel/... on EVERY figure) must be pre-installed.
      # Most are already in TinyTeX base; this adds the rest. tlmgr gotchas:
      #  - amsfonts provides amssymb, pgf provides tikz.
      #  - NO `babel-persian` package — Persian is the `persian` locale inside babel
      #    core (babel/locale/fa/babel-persian.tex).
      #  - luatexbase + ctablestack are babel's LuaTeX backend (babel -> luababel ->
      #    luatexbase -> ctablestack); the MINIMAL TinyTeX on CI omits them even
      #    though it ships babel.sty, so every figure fails with luatexbase.sty
      #    "not found" unless they are installed explicitly.
      # No `|| true`, so a genuine failure surfaces instead of being masked.
      - name: Install LaTeX packages
        run: |
          tlmgr install fontspec babel luatexbase ctablestack luaotfload unicode-math geometry pgf pgfplots \
            xcolor amsmath amsfonts mathtools fancyvrb fvextra framed pdfpages koma-script lm

      # Compile ONE real figure as a canary. A hardcoded kpsewhich list gives false
      # confidence (it once passed while luatexbase.sty was missing); a real compile
      # with the figures' exact preamble + fonts surfaces ANY missing dependency here
      # in ~5s, instead of after grinding through all 228 figures.
      - name: Verify the figure toolchain (compile one real figure)
        run: |
          lualatex --version | head -1
          python -c "import fitz, numpy; print('PyMuPDF + numpy OK')"
          cd diagrams
          canary=01-calculus-vector-calculus-fig1
          if ! lualatex -interaction=nonstopmode -halt-on-error "$canary.tex" >_canary.log 2>&1; then
            echo "--- canary figure '$canary' failed to compile ---"
            tail -n 30 _canary.log
            exit 1
          fi
          test -f "$canary.pdf" && echo "canary OK: $canary.pdf produced"

      # Pass the pip-populated interpreter explicitly: `make` would otherwise use
      # whatever `python3` resolves to, which may lack PyMuPDF/numpy.
      - name: Build vector diagrams (LuaLaTeX -> PyMuPDF -> PDF + SVG)
        run: make -C diagrams PYTHON="$(which python)"

      - name: Render book (HTML + PDF)
        run: quarto render

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
