# =====================================================================
#  MASTER OUTLINE — single source of truth for the book's structure.
#  Edit here, then run:  python tools/gen_stubs.py
#  to (re)generate chapters/*.qmd stubs and _quarto.yml.
#
#  Per-chapter fields:
#    n         integer chapter number (unique, 1..77)
#    slug      kebab-case file slug -> chapters/NN-slug.qmd
#    title_fa  Persian chapter title (reader-facing)
#    title_en  English title (planning / glossary cross-reference)
#    pages     rough page estimate
#    prereqs   list of chapter numbers that must come first
#    flags     content types this chapter must include (see flag_legend)
#    objectives  author-facing planning bullets (English); the reader-facing
#                Persian "اهداف یادگیری" is written during chapter authoring.
# =====================================================================

book:
  title_fa: "ساخت دستگاه پیشرفتهٔ MRI: از دبیرستان تا مهندسی"
  title_en: "Building a State-of-the-Art MRI: From High School to Engineer"
  subtitle_fa: "یک رسالهٔ جامع مهندسی — فیزیک، الکترونیک، نرم‌افزار، پزشکی، ساخت، ایمنی و نگه‌داری"
  author: "رحمت سعیدی"

flag_legend:
  diagrams:        "needs TikZ/Asymptote vector figures"
  code-lab:        "runnable Python/PyPulseq/recon lab"
  fem-lab:         "EM/thermal/mechanical simulation lab (FEMM/Elmer/openEMS)"
  circuit-design:  "circuit-level design + KiCad/SPICE"
  hdl:             "FPGA/HDL (Verilog/VHDL) content"
  calculations:    "worked numerical problems"
  derivation:      "rigorous mathematical derivation"
  test-procedure:  "includes a formal test procedure"
  safety-analysis: "includes hazard/risk analysis (ISO 14971 style)"
  repair-entry:    "includes maintenance/repair knowledge-base entries"
  build:           "physical build / reference-design walkthrough"

volumes:
  - id: 1
    title_fa: "مبانی ریاضی و فیزیک"
    title_en: "Mathematical & Physical Foundations"
    pages: 280
    chapters:
      - n: 1
        slug: calculus-vector-calculus
        title_fa: "حساب دیفرانسیل و انتگرال و حساب برداری"
        title_en: "Calculus and vector calculus"
        pages: 32
        prereqs: []
        flags: [diagrams, calculations, derivation]
        objectives:
          - "Build fluency with derivatives, integrals, and partial derivatives from high-school algebra."
          - "Introduce grad/div/curl, line and surface integrals, and the geometry of fields."
      - n: 2
        slug: complex-numbers-rotating-frame
        title_fa: "اعداد مختلط، آنالیز مختلط و چارچوب چرخان"
