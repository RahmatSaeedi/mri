      - n: 8
        slug: em-in-matter-quasistatics
        title_fa: "میدان‌های الکترومغناطیسی در ماده، شبه‌ایستایی و جریان‌های گردابی"
        title_en: "EM fields in matter, quasistatics, and eddy currents"
        pages: 28
        prereqs: [7]
