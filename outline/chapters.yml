          - "Introduce SNR, estimation, and statistics used throughout imaging."
      - n: 7
        slug: classical-em-maxwell
        title_fa: "الکترومغناطیس کلاسیک تا معادلات ماکسول"
        title_en: "Classical electromagnetism to Maxwell's equations"
        pages: 36
        prereqs: [1]
        flags: [diagrams, derivation, calculations]
        objectives:
