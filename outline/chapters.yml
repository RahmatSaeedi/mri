          - "Introduce the rotating frame geometrically."
      - n: 3
        slug: linear-algebra
        title_fa: "جبر خطی: تبدیل‌ها، تجزیهٔ ویژه و SVD"
        title_en: "Linear algebra: transforms, eigendecomposition, SVD"
        pages: 30
        prereqs: [1, 2]
        flags: [code-lab, calculations, derivation]
        objectives:
          - "Treat matrices as transforms; cover bases, eigenvalues/vectors, and SVD."
          - "Connect to imaging: sensitivity matrices, least squares, conditioning."
      - n: 4
        slug: fourier-sampling
        title_fa: "آنالیز فوریه و تابعی؛ نظریهٔ نمونه‌برداری"
        title_en: "Fourier and functional analysis; sampling theory"
        pages: 34
        prereqs: [1, 2, 3]
        flags: [diagrams, code-lab, derivation]
        objectives:
          - "Develop Fourier series/transform intuition and the convolution theorem."
          - "Establish sampling, Nyquist, aliasing — the conceptual heart of k-space."
      - n: 5
        slug: differential-equations-numerics
        title_fa: "معادلات دیفرانسیل و روش‌های عددی"
        title_en: "Differential equations and numerical methods"
        pages: 28
        prereqs: [1, 3]
        flags: [code-lab, calculations, derivation]
        objectives:
          - "Solve ODEs/PDEs relevant to fields and dynamics; introduce numerical integration."
          - "Prepare for the Bloch equations and field solvers."
      - n: 6
        slug: probability-noise-estimation
        title_fa: "احتمال، نوفه و تخمین"
        title_en: "Probability, noise, and estimation"
        pages: 26
        prereqs: [3, 4]
        flags: [code-lab, calculations]
        objectives:
