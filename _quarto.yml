bibliography: references/refs.bib

filters:
  - theme/ltr.lua

format:
  html:
    lang: fa
    dir: rtl
    theme:
      - cosmo
      - theme/custom.scss
    include-in-header: theme/mathjax-config.html
    toc: true
    toc-title: "فهرست"
    number-sections: true
    code-copy: true
    code-overflow: wrap
  pdf:
    pdf-engine: lualatex
    # All LaTeX packages are pre-installed (locally per README; on CI by the
    # workflow), so Quarto's auto-install is pure liability: babel's Persian locale
    # requests a hyphenation file, and Quarto maps it to the obsolete package name
    # `hyphen-persian`, which does not exist in current TeX Live -> tlmgr errors and
    # the whole render fails even though the PDF compiled fine (Persian does not
    # hyphenate, so the missing file is irrelevant). Turn auto-install off.
    latex-auto-install: false
    documentclass: scrreport
    include-in-header: theme/preamble.tex
    toc: true
    toc-depth: 2          # Quarto book maps toc-depth:N -> LaTeX tocdepth N-1;
                          # 2 => tocdepth 1 => ToC lists chapters + sections only
                          # (subsections hidden) to keep the PDF ToC compact.
    number-sections: true
    colorlinks: true
    code-overflow: wrap
